<!-- SGMaths Worksheet Generator — paste into a WordPress Custom HTML block -->
<style>
#sgm-gen *{box-sizing:border-box}
#sgm-gen{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;max-width:640px;margin:0 auto;padding:1.5rem 0}
#sgm-gen h3{font-size:16px;font-weight:600;color:#1e3a5f;margin:0 0 1rem}
#sgm-level-select{width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-weight:500;color:#1e3a5f;background:#fff;cursor:pointer;font-family:inherit;margin-bottom:1.2rem}
#sgm-level-select:focus{border-color:#1e3a5f;outline:none}
.sgm-topics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.2rem}
.sgm-topic{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;font-size:14px;color:#111;background:#fff;transition:all .15s}
.sgm-topic:hover{border-color:#6b7280;background:#f9fafb}
.sgm-topic input{width:16px;height:16px;accent-color:#1e3a5f;cursor:pointer;flex-shrink:0}
.sgm-topic.checked{border-color:#1e3a5f;background:#f0f4f9}
.sgm-divider{height:1px;background:#e5e7eb;margin:1.2rem 0}
.sgm-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;font-size:14px;color:#374151}
.sgm-toggle{position:relative;width:44px;height:24px;flex-shrink:0}
.sgm-toggle input{opacity:0;width:0;height:0;position:absolute}
.sgm-slider{position:absolute;inset:0;background:#d1d5db;border-radius:12px;cursor:pointer;transition:.2s}
.sgm-slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.sgm-toggle input:checked+.sgm-slider{background:#1e3a5f}
.sgm-toggle input:checked+.sgm-slider:before{transform:translateX(20px)}
.sgm-btns{display:flex;gap:10px;margin-top:1.4rem;flex-wrap:wrap}
.sgm-btn{flex:1;min-width:180px;padding:12px 20px;font-size:14px;font-weight:600;border-radius:8px;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
.sgm-btn-primary{background:#1e3a5f;color:#fff}
.sgm-btn-primary:hover{background:#162e4d}
.sgm-btn-secondary{background:#f3f4f6;color:#1e3a5f;border:1px solid #d1d5db}
.sgm-btn-secondary:hover{background:#e5e7eb}
.sgm-btn:disabled{opacity:.5;cursor:not-allowed}
.sgm-status{margin-top:1rem;padding:12px 14px;border-radius:8px;font-size:13px;display:none}
.sgm-status.show{display:block}
.sgm-status.loading{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.sgm-status.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.sgm-selall{font-size:12px;color:#6b7280;cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;font-family:inherit}
.sgm-selall:hover{color:#111}
</style>

<div id="sgm-gen">
  <h3>Generate Worksheet</h3>

  <div style="font-size:13px;color:#6b7280;margin-bottom:6px">Select level:</div>
  <select id="sgm-level-select">
    <option value="P3">Primary 3</option>
    <option value="P4">Primary 4</option>
    <option value="P5">Primary 5</option>
    <option value="P6">Primary 6</option>
  </select>

  <div class="sgm-divider" style="margin-top:0"></div>

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
    <span style="font-size:13px;color:#6b7280">Select topics to include:</span>
    <button class="sgm-selall" id="sgm-selall-btn">Select all</button>
  </div>
  <div class="sgm-topics" id="sgm-topics"></div>

  <div class="sgm-divider"></div>

  <div class="sgm-row">
    <label class="sgm-toggle">
      <input type="checkbox" id="sgm-answers">
      <span class="sgm-slider"></span>
    </label>
    <span>Include answer key</span>
  </div>

  <div class="sgm-btns">
    <button class="sgm-btn sgm-btn-primary" id="sgm-btn-ws">&#11015; Download Worksheet PDF</button>
    <button class="sgm-btn sgm-btn-secondary" id="sgm-btn-ans">&#11015; Download with Answers</button>
  </div>

  <div class="sgm-status" id="sgm-status"></div>
</div>

<script>
(function(){
  var SGM_SERVER = "https://sgmaths-worksheet.onrender.com";

  var SGM_TOPICS = {
    P3: ["Multiplication & Division","Fractions","Angles & Lines","Data & Graphs","Word Problems"],
    P4: ["Fractions","Angles & Geometry","Whole Numbers","Decimals","Data & Tables","Word Problems"],
    P5: ["Triangles & Area","Volume","Decimals & Measurement","3D Solids & Views","Fractions","Word Problems"],
    P6: ["Whole Numbers & Decimals","Fractions, Ratio & Percentage","Geometry & Angles","Area & Perimeter","Data & Algebra","Word Problems"]
  };

  function renderTopics(level){
    var topics = SGM_TOPICS[level] || [];
    var el = document.getElementById('sgm-topics');
    el.innerHTML = '';
    topics.forEach(function(t){
      var lbl = document.createElement('label');
      lbl.className = 'sgm-topic checked';
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = t;
      cb.checked = true;
      cb.addEventListener('change', function(){
        lbl.classList.toggle('checked', cb.checked);
      });
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(' ' + t));
      el.appendChild(lbl);
    });
  }

  function setStatus(msg, type){
    var el = document.getElementById('sgm-status');
    el.textContent = msg;
    el.className = 'sgm-status show ' + type;
  }

  function clearStatus(){
    document.getElementById('sgm-status').className = 'sgm-status';
  }

  function getButtons(){ return document.querySelectorAll('.sgm-btn'); }

  function download(withAnswers){
    var level = document.getElementById('sgm-level-select').value;
    var checked = document.querySelectorAll('#sgm-topics input:checked');
    var topics = [];
    checked.forEach(function(cb){ topics.push(cb.value); });

    if(topics.length === 0){ setStatus('Please select at least one topic.','error'); return; }

    var includeAnswers = withAnswers || document.getElementById('sgm-answers').checked;
    getButtons().forEach(function(b){ b.disabled = true; });
    setStatus('Generating your worksheet... this takes about 10 seconds.','loading');

    fetch(SGM_SERVER + '/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ level: level, topics: topics, include_answers: includeAnswers })
    }).then(function(res){
      if(!res.ok) throw new Error('Server error: ' + res.status);
      return res.blob();
    }).then(function(blob){
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'sgmaths_' + level + '_worksheet' + (includeAnswers ? '_answers' : '') + '.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      clearStatus();
    }).catch(function(){
      setStatus('Something went wrong. Please try again in a moment.','error');
    }).finally(function(){
      getButtons().forEach(function(b){ b.disabled = false; });
    });
  }

  // Init
  document.getElementById('sgm-level-select').addEventListener('change', function(){
    renderTopics(this.value);
  });
  document.getElementById('sgm-selall-btn').addEventListener('click', function(){
    document.querySelectorAll('#sgm-topics input').forEach(function(cb){
      cb.checked = true;
      cb.closest('.sgm-topic').classList.add('checked');
    });
  });
  document.getElementById('sgm-btn-ws').addEventListener('click', function(){ download(false); });
  document.getElementById('sgm-btn-ans').addEventListener('click', function(){ download(true); });

  renderTopics('P3');
})();
</script>
